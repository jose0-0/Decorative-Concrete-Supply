name: Deploy to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /root/dcslv

            # Pull latest code
            git pull origin main

            # Install any new dependencies
            npm install

            # Build the Next.js app
            npm run build

            # Restart the app container
            docker restart dcslv-app
```

---

### Step 4 — Verify the Publish Workflow Still Works

Your existing `publish-articles.yml` commits `index.json` back to `main` when articles are published. That commit will now automatically trigger this deploy workflow, which is exactly what you want — article publishes automatically trigger a site rebuild and restart.

The two workflows together create this chain:
```
Midnight UTC
    → publish-articles.yml runs
    → index.json updated, committed to main
    → deploy.yml triggers on that commit
    → Droplet pulls new code, rebuilds, restarts
    → New article is live on dcslv.net