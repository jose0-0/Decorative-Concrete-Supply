name: Publish Scheduled Articles

on:
  schedule:
    # Runs daily at midnight UTC
    # That is 4PM or 5PM Las Vegas time depending on daylight saving
    - cron: "0 0 * * *"

  # Allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run publish script
        run: node .github/scripts/publish-articles.js

      - name: Commit and push if articles were published
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/index.json
          git diff --staged --quiet || git commit -m "chore: publish scheduled articles [skip ci]"
          git push
